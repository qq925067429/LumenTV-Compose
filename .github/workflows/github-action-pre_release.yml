name: LumenTV Compose Build Pre Release
on:
  push:
    branches: [ pre-release ]
jobs:
  set-tag:
    uses: ./.github/workflows/set-tag-workflow.yml

  build-updater:
    uses: ./.github/workflows/build-updater.yml
    with:
      release_tag: ${{ needs.set-tag.outputs.tag }}

  build-win:
    runs-on: windows-latest
    needs: [ set-tag, build-updater ]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: 🏗️ Build LumenTV Windows
        run: |
          echo "🔨 开始构建 LumenTV Windows 版本"
          ./gradlew packageReleaseDistributionForCurrentOS --quiet --console=plain
          ./gradlew createReleaseDistributable --quiet --console=plain
      - name: 📦 Package Windows application
        shell: pwsh
        run: Compress-Archive -Path "./composeApp/build/compose/binaries/main-release/app/LumenTV" -DestinationPath ./LumenTV-win-${{ needs.set-tag.outputs.tag }}.zip
      - run: ls
      - uses: actions/upload-artifact@v4
        with:
          name: win-file
          path: |
            *.msi
            *.zip

  build-linux:
    runs-on: ubuntu-latest
    needs: [ set-tag, build-updater ]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'
      - run: ls
      - run: chmod +x ./gradlew && ./gradlew createReleaseDistributable
      - run: ./gradlew packageReleaseDistributionForCurrentOS
      - run: ls && tree
      - name: compress
        run: cd ./composeApp/build/compose/binaries/main-release/app && zip -q -r ./TV-linux-${{ needs.set-tag.outputs.tag }}.zip ./LumenTV
      - name: move file
        run: mv ./composeApp/build/compose/binaries/main-release/deb/*.deb ./LumenTV-linux-${{ needs.set-tag.outputs.tag }}.deb && mv ./composeApp/build/compose/binaries/main-release/app/*.zip ./
      - run: ls
      - uses: actions/upload-artifact@v4
        with:
          name: linux-file
          path: |
            *.deb
            *.zip

  build-mac:
    runs-on: macos-latest
    needs: [ set-tag, build-updater ]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'
      - run: ls
      - run: chmod +x ./gradlew && ./gradlew createReleaseDistributable
      - run: ls
      - name: compress
        run: zip -q -r ./LumenTV-mac-${{ needs.set-tag.outputs.tag }}.zip ./composeApp/build/compose/binaries/main-release/app
      - run: ls
      - uses: actions/upload-artifact@v4
        with:
          name: mac-file
          path: |
            *.dmg
            *.zip
  release:
    runs-on: ubuntu-latest
    needs: [ build-win, build-linux, build-mac, set-tag, build-updater ]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4

      - name: 📋 Organize files for release
        run: |
          echo "📂 整理发布文件"
          mkdir -p ./release-files
          
          # 复制应用程序包
          cp ./win-file/* ./release-files/ 2>/dev/null || true
          cp ./linux-file/* ./release-files/ 2>/dev/null || true
          cp ./mac-file/* ./release-files/ 2>/dev/null || true
          
          # 复制 updater 文件（artifact 名称已包含平台信息）
          find . -path "*/updater-linux-amd64/updater" -exec cp {} ./release-files/updater-linux-amd64 \;
          find . -path "*/updater-linux-arm64/updater" -exec cp {} ./release-files/updater-linux-arm64 \;
          find . -path "*/updater-windows-amd64/updater.exe" -exec cp {} ./release-files/updater-windows-amd64.exe \;
          find . -path "*/updater-macos-amd64/updater" -exec cp {} ./release-files/updater-macos-amd64 \;
          find . -path "*/updater-macos-arm64/updater" -exec cp {} ./release-files/updater-macos-arm64 \;

          echo "📋 发布文件列表:"
          ls -la ./release-files/

      - name: 📝 Generate version.json
        run: |
          echo "📝 生成版本信息文件"
          VERSION="${{ needs.set-tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          printf '{\n  "version": "%s",\n  "windows": {\n    "download_url": "https://github.com/%s/releases/download/%s/LumenTV-win-%s.zip",\n    "msi_url": "https://github.com/%s/releases/download/%s/LumenTV-win-%s.msi"\n  },\n  "linux": {\n    "download_url": "https://github.com/%s/releases/download/%s/LumenTV-linux-%s.zip",\n    "deb_url": "https://github.com/%s/releases/download/%s/LumenTV-linux-%s.deb"\n  },\n  "mac": {\n    "download_url": "https://github.com/%s/releases/download/%s/LumenTV-mac-%s.zip",\n    "dmg_url": "https://github.com/%s/releases/download/%s/LumenTV-mac-%s.dmg"\n  }\n}\n' \
            "$VERSION" \
            "$REPO" "$VERSION" "$VERSION" \
            "$REPO" "$VERSION" "$VERSION" \
            "$REPO" "$VERSION" "$VERSION" \
            "$REPO" "$VERSION" "$VERSION" \
            "$REPO" "$VERSION" "$VERSION" \
            "$REPO" "$VERSION" "$VERSION" \
            > ./release-files/version.json

      - name: 📖 Extract changelog for current version
        id: changelog
        run: |
          echo "📖 从 CHANGELOG.md 提取 ${{ needs.set-tag.outputs.tag }} 的更新日志"
          
          VERSION_WITH_V="${{ needs.set-tag.outputs.tag }}"
          
          # 使用 awk 提取对应版本的更新日志
          CHANGELOG=$(awk -v version="$VERSION_WITH_V" '
            BEGIN { found=0; content="" }
            /^## / {
              if (found) exit
              if ($2 == version) {
                found=1
                next
              }
            }
            found && /^## / { exit }
            found { 
              if (content != "") content = content "\n"
              content = content $0
            }
            END { print content }
          ' CHANGELOG.md)
          
          # 如果未找到对应的版本日志，使用默认文本
          if [ -z "$CHANGELOG" ]; then
            echo "⚠️ 未找到 $VERSION_WITH_V 的更新日志，使用默认文本"
            CHANGELOG=$(printf -- "- 发布新版本 %s\n- 详细更新内容请查看 CHANGELOG.md" "$VERSION_WITH_V")
          fi
  
          echo "✅ 提取到的更新日志:"
          echo "$CHANGELOG"
          
          # 将多行内容保存到环境变量
          echo "changelog<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-files/*
          tag_name: ${{ needs.set-tag.outputs.tag }}
          name: "LumenTV ${{ needs.set-tag.outputs.tag }} (Pre-Release)"
          body: |
            ## LumenTV ${{ needs.set-tag.outputs.tag }} Pre-Release
            
            > ⚠️ **这是预发布版本**，可能包含实验性功能或不稳定的更改。
            
            ### 📝 更新日志
            
            ${{ steps.changelog.outputs.changelog }}
            
            ---
            
            ### 📦 包含文件
            - **Windows**: MSI 安装包和 ZIP 压缩包
            - **Linux**: DEB 包和 ZIP 压缩包  
            - **macOS**: DMG 镜像和 ZIP 压缩包
            - **Updater**: 各平台独立的更新器组件
            - **version.json**: 版本信息文件
            
            ### 🔗 快速下载
            
            | 平台 | 安装包 | 压缩包 |
            |------|--------|--------|
            | Windows | [MSI](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-win-${{ needs.set-tag.outputs.tag }}.msi) | [ZIP](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-win-${{ needs.set-tag.outputs.tag }}.zip) |
            | Linux | [DEB](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-linux-${{ needs.set-tag.outputs.tag }}.deb) | [ZIP](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-linux-${{ needs.set-tag.outputs.tag }}.zip) |
            | macOS | [DMG](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-mac-${{ needs.set-tag.outputs.tag }}.dmg) | [ZIP](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-mac-${{ needs.set-tag.outputs.tag }}.zip) |
            
            > 💡 提示：完整的历史更新记录请查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          draft: false
          prerelease: true
    permissions:
      contents: write